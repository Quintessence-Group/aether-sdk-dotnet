name: Release

# Publish to NuGet by pushing a tag `v<version>` matching <Version> in the csproj.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Verify tag matches csproj version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(grep '<Version>' src/Aether.Sdk/Aether.Sdk.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match csproj version ($PKG_VERSION)"
            exit 1
          fi

      - name: Pack
        run: dotnet pack src/Aether.Sdk/Aether.Sdk.csproj --configuration Release --no-build --output ./artifacts

      # Package id is AetherDb.Sdk (the Aether.* prefix is reserved on NuGet.org).
      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Install smoke from NuGet
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          dotnet new console -n AetherSmoke -o /tmp/smoke
          cd /tmp/smoke
          for attempt in 1 2 3 4 5; do
            if dotnet add package AetherDb.Sdk --version "${TAG_VERSION}" --source https://api.nuget.org/v3/index.json; then break; fi
            [ "$attempt" = "5" ] && exit 1
            sleep 20
          done
          dotnet build
