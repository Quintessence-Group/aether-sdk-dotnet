name: Release

# Publishes AetherDb.Sdk to NuGet.org using NuGet Trusted Publishing (OIDC).
# No long-lived API key is stored: the workflow exchanges a short-lived GitHub
# OIDC token for a temporary NuGet key at publish time.
#
# Trigger:  git tag v0.1.0 && git push origin v0.1.0   (or run manually)
#
# Matches the nuget.org "deploy" trusted-publishing policy:
#   owner: aether-ai · repo: Quintessence-Group/aether-sdk-dotnet
#   workflow: release.yml · environment: prod
#
# Requires one repo secret:
#   NUGET_USER = your nuget.org username (profile name, NOT an email address)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build, test & publish to NuGet
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write # required for the NuGet Trusted Publishing OIDC exchange
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build (Release)
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack src/Aether.Sdk/Aether.Sdk.csproj -c Release -o ./artifacts

      - name: NuGet login (OIDC → short-lived key)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
